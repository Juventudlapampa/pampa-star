<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>PAMPA STAR · Hito 1 — La rebanada épica (Phaser)</title>
<style>
  html,body{margin:0;height:100%;background:#06120b;overflow:hidden;
    font-family:'JetBrains Mono',ui-monospace,monospace;color:#f6efdc;-webkit-tap-highlight-color:transparent;}
  #game{width:100vw;height:100dvh;display:flex;align-items:center;justify-content:center;}
  #game canvas{max-width:100vw;max-height:100dvh;}
  /* aviso de rotar en vertical (mobile-first APAISADO) */
  #rotate{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:1rem;background:#06120b;z-index:50;text-align:center;padding:2rem;}
  #rotate .ico{font-size:3rem;animation:spin 1.8s ease-in-out infinite;}
  #rotate b{color:#ffd84d;font-size:1.1rem;}
  @keyframes spin{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
  @media (orientation:portrait) and (max-width:820px){ #rotate{display:flex;} #game{display:none;} }
  #boot-msg{position:fixed;left:0;right:0;bottom:8px;text-align:center;font-size:.7rem;opacity:.5;}
</style>
</head>
<body>
  <div id="game"></div>
  <div id="rotate"><div class="ico">📱↻</div><b>Girá el celular</b><div>PAMPA STAR se juega apaisado (horizontal).</div></div>
  <div id="boot-msg">Hito 1 · rebanada épica — el HTML clásico sigue en <a href="../index.html" style="color:#7ee08a">../index.html</a></div>

  <script src="vendor/phaser.min.js"></script>
  <script src="logic/duel.js"></script>
  <script src="logic/perspectiva.js"></script>
  <script src="logic/tiro.js"></script>
  <script src="logic/partido.js"></script>
  <script src="audio/sfx.js"></script>
  <script src="scenes/sprites.js"></script>
  <script src="scenes/match.js"></script>
  <script>
  "use strict";
  // fallback mínimo (mismos números que data/balance.json) para abrir con doble clic sin server
  const BALANCE_FALLBACK = {
    mundo:{ancho:1050,alto:680,arco_medio:55},
    duelo:{spread:58,min:0.07,max:0.95,shot_power:66,keeper_skill:{normal:46,figura:92}},
    tiro:{zonas:[
      {id:"alto_izq",n:"Ángulo alto",bonus:6,fuera:0.14,gy:-44},
      {id:"alto_centro",n:"Alto al medio",bonus:-2,fuera:0.03,gy:0},
      {id:"alto_der",n:"Ángulo alto",bonus:6,fuera:0.14,gy:44},
      {id:"bajo_izq",n:"Palo bajo",bonus:4,fuera:0.08,gy:-38},
      {id:"bajo_centro",n:"Al medio",bonus:-4,fuera:0.01,gy:0},
      {id:"bajo_der",n:"Palo bajo",bonus:4,fuera:0.08,gy:38}]},
    tiro_ejecucion:{peso_destreza:0.65,ruido_max:0.38,potencia_dulce:[0.6,0.88],penal_potencia_floja:26,fuera_potencia_pasada:0.5,bonus_esquina:14,fuera_esquina:0.16,fuera_borde:0.8,curva_bonus:5,gy_max:44,sens_arrastre:1.35,sens_comba:4,tecla_paso:0.14,tecla_osc_ms:1100},
    juego:{vel_jugador:210,vel_avance_auto:46,zona_remate_y:250},
    cine:{persp:{k:3.2},plano_pie_ms:460,plano_viaje_ms:1050,plano_esfuerzo_ms:360,plano_arquero_ms:520,corte_ms:90,corte_flash_ms:120,slowmo_desde:0.72,slowmo_factor:0.32,lineas_velocidad:14,desenlace_hold_ms:1200,zoom_viaje:1.25,camara_pan_ms:420,drift_mult:1.4,pelota_escala_base:0.5,pelota_escala_span:3.7,impacto_gol_ms:340,impacto_atajada_ms:320,impacto_afuera_ms:420},
    epica:{flash_ms:120,shake_intensidad:0.012,shake_ms:260,red_sacudida_ms:700,rebote_atajada_ms:520,atajada_shake_ms:140,atajada_shake_int:0.006,afuera_ms:520,fanfarria_delay_ms:90,red_vida_frames:90,camara_reset_ms:420},
    ritmo:{portador_con_pelota:84,defensor_cerrando:104,perseguidor_sin_pelota:94,rival_con_pelota:58,posicionales_por_segundo:55,radio_encuentro:26,cooldown_encuentro_ms:3200,persecutores:1,arranque_rival_ms:1500,seg_por_minuto:24,salto_accion_min:0.4,salto_accion_max:0.9,descuento_min:1,descuento_max:3,zoom_encuentro:1.22,zoom_encuentro_ms:380},
    persecucion:{aguante_por_segundo:6,aguante_minimo_para_correr:8,factor_trote:0.6},
    conduccion:{aguante_por_segundo:3},
    aguante:{max:100,umbral_rendido:25,costo_gambeta:8,costo_pase:4,costo_pared:10,costo_tiro:14,costo_quite:8,costo_corte:6,costo_bloqueo:7,costo_calden:30,recuperacion_entretiempo_frac:0.125,cpu_factor_costo:0.75},
    partido:{jugadores_por_lado:11,formacion:[{pos:"ARQ",n:1,ax:30},{pos:"DEF",n:4,ax:190},{pos:"VOL",n:3,ax:460},{pos:"ATA",n:3,ax:730}],elasticidad:{ARQ:0.02,DEF:0.25,VOL:0.45,ATA:0.6},dist_tiro:380,dist_remate_rival:200,pase_radio:380,pase_penal_lejano:0.05,matriz_bonus:12,cpu_pesos:{quite:0.4,corte:0.3,bloqueo:0.3},calden:{x_min:680,aguante:30,mult:1.3}}
  };

  /* Cargamos balance + roster ANTES de crear el juego (fetch simple, tolerante
     a fallo). Así no hace falta escena boot con transición async: match es la
     primera escena y ya tiene la data en el registry. */
  window.addEventListener("pointerdown", ()=>{ try{ window.PampaSFX && window.PampaSFX.unlock(); }catch(e){} });
  /* balance + roster (los dos tolerantes a fallo: el juego abre igual sin server) */
  const pBal = fetch("data/balance.json").then(r=>r.ok?r.json():Promise.reject()).catch(()=>BALANCE_FALLBACK);
  const pRoster = fetch("../data/roster_pampeano.json").then(r=>r.ok?r.json():null).catch(()=>null);
  Promise.all([pBal, pRoster]).then(([bal, roster])=>{
    if(window.PAMPA_GAME){ try{ window.PAMPA_GAME.destroy(true); }catch(e){} }
    window.__PAMPA_ROSTER = roster;
    arrancarCon(bal, roster);
  });
  function arrancarCon(balance, roster){
    const config = {
      type: Phaser.AUTO,
      parent: "game",
      backgroundColor: "#06120b",
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 960, height: 540 },
      render: { pixelArt: false, antialias: true },
      callbacks: { preBoot: (game)=>{ game.registry.set("balance", balance); game.registry.set("roster", roster); } },
      scene: [ window.PampaMatch ]
    };
    window.PAMPA_GAME = new Phaser.Game(config);
  }
  </script>
</body>
</html>
