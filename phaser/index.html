<style>
  html,body{margin:0;height:100%;background:#06120b;overflow:hidden;
    font-family:'JetBrains Mono',ui-monospace,monospace;color:#f6efdc;-webkit-tap-highlight-color:transparent;}
  #game{width:100vw;height:100dvh;display:flex;align-items:center;justify-content:center;}
  #game canvas{max-width:100vw;max-height:100dvh;}
  /* aviso de rotar en vertical (mobile-first APAISADO) */
  #rotate{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:1rem;background:#06120b;z-index:50;text-align:center;padding:2rem;}
  #rotate .ico{font-size:3rem;animation:spin 1.8s ease-in-out infinite;}
  #rotate b{color:#ffd84d;font-size:1.1rem;}
  @keyframes spin{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
  @media (orientation:portrait) and (max-width:820px){ #rotate{display:flex;} #game{display:none;} }
  #boot-msg{position:fixed;left:0;right:0;bottom:8px;text-align:center;font-size:.7rem;opacity:.5;}
</style>

  /* Cargamos balance + roster ANTES de crear el juego (fetch simple, tolerante
     a fallo). Así no hace falta escena boot con transición async: match es la
     primera escena y ya tiene la data en el registry. */
  window.addEventListener("pointerdown", ()=>{ try{ window.PampaSFX && window.PampaSFX.unlock(); }catch(e){} });
  /* balance + roster (los dos tolerantes a fallo: el juego abre igual sin server) */
  const pBal = fetch("data/balance.json").then(r=>r.ok?r.json():Promise.reject()).catch(()=>BALANCE_FALLBACK);
  const pRoster = fetch("../data/roster_pampeano.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pRetratos = fetch("../data/portraits_manifest.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pMega = fetch("../data/megacosas.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pRelatos = fetch("../data/relatos.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pPoses = fetch("../data/poses_manifest.json").then(r=>r.ok?r.json():null).catch(()=>null);
  Promise.all([pBal, pRoster, pRetratos, pMega, pRelatos, pPoses]).then(([bal, roster, retratos, mega, relatos, poses])=>{
    if(window.PAMPA_GAME){ try{ window.PAMPA_GAME.destroy(true); }catch(e){} }
    window.__PAMPA_ROSTER = roster;
    arrancarCon(bal, roster, retratos, mega, relatos, poses);
  });
  function arrancarCon(balance, roster, retratos, mega, relatos, poses){
    const config = {
      type: Phaser.AUTO,
      parent: "game",
      backgroundColor: "#06120b",
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 960, height: 540 },
      render: { roundPixels: true, pixelArt: true },   // config base del doc v2 §2: pixel nítido, scroll sin temblor
      callbacks: { preBoot: (game)=>{ game.registry.set("balance", balance); game.registry.set("roster", roster); game.registry.set("portraits", retratos); game.registry.set("megacosas", mega); game.registry.set("relatos", relatos); game.registry.set("poses", poses); } },
      scene: [ window.PampaIntro, window.PampaEditor, window.PampaMatch ]   // OPENING (salteable) → editor de pinta → ¡A LA CANCHA!
    };
    window.PAMPA_GAME = new Phaser.Game(config);
  }
