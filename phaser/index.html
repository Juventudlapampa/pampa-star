  /* V7 §0.3 TIPOGRAFÍA: dos fuentes self-hosteadas (OFL, assets/fonts/ + README):
     DISPLAY = Press Start 2P (títulos/botones) · TEXTO = VT323 (cuerpo).
     Familias configurables en balance.json → tipografia. */
  @font-face{font-family:'Press Start 2P';src:url('../assets/fonts/PressStart2P-Regular.ttf') format('truetype');font-display:swap;}
  @font-face{font-family:'Pixelify Sans';src:url('../assets/fonts/PixelifySans-Regular.ttf') format('truetype');font-display:swap;}
  @font-face{font-family:'VT323';src:url('../assets/fonts/VT323-Regular.ttf') format('truetype');font-display:swap;}
  html,body{margin:0;height:100%;background:#06120b;overflow:hidden;
    font-family:'Pixelify Sans','VT323',ui-monospace,monospace;color:#f6efdc;-webkit-tap-highlight-color:transparent;}
  #game{width:100vw;height:100dvh;display:flex;align-items:center;justify-content:center;}
  #game canvas{max-width:100vw;max-height:100dvh;}
  /* aviso de rotar en vertical (mobile-first APAISADO) */
  #rotate{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:1rem;background:#06120b;z-index:50;text-align:center;padding:2rem;}
  #rotate .ico{font-size:3rem;animation:spin 1.8s ease-in-out infinite;}
  #rotate b{color:#ffd84d;font-size:1.1rem;}
  @keyframes spin{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
  @media (orientation:portrait) and (max-width:820px){ #rotate{display:flex;} #game{display:none;} }
  #boot-msg{position:fixed;left:0;right:0;bottom:8px;text-align:center;font-size:.7rem;opacity:.5;}
</style>

  };

  /* Cargamos balance + roster ANTES de crear el juego (fetch simple, tolerante
     a fallo). Así no hace falta escena boot con transición async: match es la
     primera escena y ya tiene la data en el registry. */
  window.addEventListener("pointerdown", ()=>{ try{ window.PampaSFX && window.PampaSFX.unlock(); }catch(e){} });
  /* V7 §5 PWA: el juego se instala y abre OFFLINE (sw.js, solo https/localhost;
     con file:// no aplica y no molesta) */
  if ("serviceWorker" in navigator && (location.protocol === "https:" || location.hostname === "localhost" || location.hostname === "127.0.0.1")) {
    window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
  }
  /* balance + roster (los dos tolerantes a fallo: el juego abre igual sin server) */
  const pBal = fetch("data/balance.json").then(r=>r.ok?r.json():Promise.reject()).catch(()=>BALANCE_FALLBACK);
  const pRoster = fetch("../data/roster_pampeano.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pRetratos = fetch("../data/portraits_manifest.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pMega = fetch("../data/megacosas.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pRelatos = fetch("../data/relatos.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pPoses = fetch("../data/poses_manifest.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pCaras = fetch("../data/caras_manifest.json").then(r=>r.ok?r.json():null).catch(()=>null);
  const pDivisiones = fetch("../data/divisiones.json").then(r=>r.ok?r.json():null).catch(()=>null);
  /* V8 §5: esperar las fuentes antes de crear textos — tope 8s (en celu con
     red lenta 2.5s no alcanzaba y los ACENTOS quedaban rasterizados con el
     fallback para siempre). Y si igual llegan tarde, el fonts.ready de abajo
     RE-RASTERIZA todos los textos vivos. */
  const pFuentes = Promise.race([
    Promise.all([document.fonts.load("12px 'Press Start 2P'"), document.fonts.load("12px 'Pixelify Sans'"), document.fonts.load("12px 'VT323'")]),
    new Promise(r=>setTimeout(r, 8000))
  ]).catch(()=>null);
  /* la red del fix: cuando las fuentes terminan de llegar (aunque sea tarde),
     cada Text vivo de Phaser se re-rasteriza — los acentos nunca quedan rotos */
  document.fonts.ready.then(()=>{
    try{
      if (!window.PAMPA_GAME) return;
      window.PAMPA_GAME.scene.scenes.forEach(s=>{
        if (!s.sys || !s.sys.displayList) return;
        s.sys.displayList.list.forEach(function refrescarTexto(o){
          if (o && o.type === "Text" && o.updateText) o.updateText();
          if (o && o.list) o.list.forEach(refrescarTexto);
        });
      });
    }catch(e){}
  });
  Promise.all([pBal, pRoster, pRetratos, pMega, pRelatos, pPoses, pCaras, pDivisiones, pFuentes]).then(([bal, roster, retratos, mega, relatos, poses, caras, divisiones])=>{
    if(window.PAMPA_GAME){ try{ window.PAMPA_GAME.destroy(true); }catch(e){} }
    window.__PAMPA_ROSTER = roster;
    /* las familias del balance mandan (Rodri las afina en tipografia) */
    if (bal && bal.tipografia) {
      if (bal.tipografia.display) window.PF.display = bal.tipografia.display;
      if (bal.tipografia.texto) window.PF.texto = bal.tipografia.texto;
    }
    arrancarCon(bal, roster, retratos, mega, relatos, poses, caras, divisiones);
  });
  function arrancarCon(balance, roster, retratos, mega, relatos, poses, caras, divisiones){
    const config = {
      type: Phaser.AUTO,
      parent: "game",
      backgroundColor: "#06120b",
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: 960, height: 540 },
      render: { roundPixels: true, pixelArt: true },   // config base del doc v2 §2: pixel nítido, scroll sin temblor
      callbacks: { preBoot: (game)=>{ game.registry.set("balance", balance); game.registry.set("roster", roster); game.registry.set("portraits", retratos); game.registry.set("megacosas", mega); game.registry.set("relatos", relatos); game.registry.set("poses", poses); game.registry.set("caras", caras); game.registry.set("divisiones", divisiones); } },
      scene: [ window.PampaIntro, window.PampaEditor, window.PampaMasterScene, window.PampaMatch ]   // OPENING → editor → (🏆 carrera) → partido
    };
    window.PAMPA_GAME = new Phaser.Game(config);
  }
  </script>
